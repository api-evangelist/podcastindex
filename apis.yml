apis:
  - aid: podcastindex:podcastindex
    name: PodcastIndex API
    description: >-
      The Podcast Index API provides search, discovery, and metadata access for
      podcasts and episodes, including support for value-for-value, podcast
      namespace tags, live items, and other modern podcasting features. It is
      a free, open data API with examples and libraries available across
      multiple programming languages.
    humanURL: https://podcastindex-org.github.io/docs-api/
    baseURL: https://api.podcastindex.org/api/1.0
